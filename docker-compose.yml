services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: omni_player
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d omni_player"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://user:password@db:5432/omni_player
      - TTS_AUDIO_DIR=/app/tts_audio
      - TTS_MODEL_DIR=/app/tts_models
      - PIPER_BIN=piper
      - RVC_ENABLED=false
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
      - ./tts_audio:/app/tts_audio
      - ./tts_models:/app/tts_models
      - ./downloads:/app/downloads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
