<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Player - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .btn-admin {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-user {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-user:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .user-info {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.95em;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .btn-logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 0.95em;
            width: auto;
        }

        .btn-logout:hover {
            background: #c0392b;
            transform: none;
        }

        .hidden {
            display: none;
        }

        .loading {
            color: #999;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Omni Player</h1>
        <p class="subtitle">Multiplayer Audio Streaming</p>

        <div class="button-group">
            <button class="btn btn-admin" onclick="location.href='/live'">
                👑 Admin Panel
            </button>
            <button class="btn btn-user" onclick="location.href='/user'">
                🎧 User Player
            </button>
        </div>

        <div class="user-info" id="userInfo"></div>
    </div>

    <script>
        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                return; // Not logged in, don't show anything
            }

            try {
                const response = await fetch(window.location.origin + '/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userInfo').innerHTML = `
                        <p class="user-name">👤 Logged in as ${user.username}</p>
                        <button class="btn btn-logout" onclick="logout()">Logout</button>
                    `;
                }
            } catch (error) {
                // Ignore errors, just don't show user info
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        loadUserInfo();
    </script>
</body>
</html>
